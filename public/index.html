<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ml-yellow: #FFE600;
    --ml-yellow-dark: #C8B800;
    --ml-blue: #3483FA;
    --ml-blue-dark: #2968C8;
    --ml-green: #00A650;
    --ml-green-light: #E8F8EF;
    --bg: #F5F5F5;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text-mid: #4A4A4A;
    --text-muted: #888;
    --border: #E0E0E0;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-hover: 0 6px 20px rgba(0,0,0,0.13);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: var(--ml-yellow);
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
    height: 60px;
  }
  .logo {
    font-size: 20px;
    font-weight: 700;
    color: #1A1A1A;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--ml-blue); }
  .search-bar {
    flex: 1;
    display: flex;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.15s;
    max-width: 600px;
  }
  .search-bar:focus-within { border-color: var(--ml-blue); }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    padding: 0.5rem 0.75rem;
    font-size: 14px;
    color: var(--text);
    background: transparent;
  }
  .search-bar button {
    background: var(--ml-blue);
    border: none;
    color: white;
    padding: 0 1rem;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.15s;
  }
  .search-bar button:hover { background: var(--ml-blue-dark); }

  .affiliate-badge {
    background: var(--ml-blue);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── CONFIG BANNER ── */
  .config-banner {
    background: #fff3cd;
    border-bottom: 1px solid #ffc107;
    padding: 0.6rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .config-banner .cb-inner {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .config-banner span { font-size: 13px; color: #5a4000; font-weight: 500; }
  .config-banner input {
    border: 1px solid #ffc107;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 13px;
    width: 220px;
    outline: none;
    background: white;
  }
  .config-banner input:focus { border-color: var(--ml-blue); }
  .config-banner button {
    background: var(--ml-blue);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  .config-banner .tag-preview {
    font-size: 12px;
    color: var(--ml-green);
    font-weight: 600;
    display: none;
  }

  /* ── MAIN LAYOUT ── */
  .main-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* ── CATEGORIES ── */
  .categories {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .cat-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    color: var(--text-mid);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .cat-btn:hover { border-color: var(--ml-blue); color: var(--ml-blue); }
  .cat-btn.active {
    background: var(--ml-blue);
    border-color: var(--ml-blue);
    color: white;
  }

  /* ── RESULTS META ── */
  .results-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .results-count { font-size: 14px; color: var(--text-muted); }
  .sort-select {
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    outline: none;
    background: white;
    cursor: pointer;
    color: var(--text);
  }

  /* ── LOADING / ERROR ── */
  .state-box {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--ml-blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-box p { font-size: 15px; }
  .state-box .hint { font-size: 13px; margin-top: 0.5rem; }

  /* ── PRODUCT GRID ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }

  /* ── PRODUCT CARD ── */
  .product-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.18s, transform 0.18s;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .product-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
  }

  .card-img-wrap {
    aspect-ratio: 1;
    overflow: hidden;
    background: #F8F8F8;
    position: relative;
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 12px;
    transition: transform 0.2s;
  }
  .product-card:hover .card-img-wrap img { transform: scale(1.05); }

  .free-shipping-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--ml-green);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .installments-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: #E8F0FF;
    color: var(--ml-blue-dark);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
  }

  .card-body {
    padding: 0.9rem;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 6px;
  }

  .card-title {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 36px;
    font-weight: 400;
  }

  .card-seller {
    font-size: 11px;
    color: var(--text-muted);
  }

  .card-price-area { margin-top: 2px; }
  .old-price {
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: line-through;
  }
  .price-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .card-price {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .discount-tag {
    font-size: 11px;
    font-weight: 700;
    color: var(--ml-green);
    background: var(--ml-green-light);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .installments {
    font-size: 11px;
    color: var(--ml-green);
    font-weight: 500;
  }

  .rating-row {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .stars { color: #F5A623; font-size: 12px; }

  .card-footer { margin-top: auto; padding-top: 8px; }
  .btn-ver {
    display: block;
    width: 100%;
    background: var(--ml-blue);
    color: white;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s;
    cursor: pointer;
    border: none;
  }
  .btn-ver:hover { background: var(--ml-blue-dark); }
  .btn-share {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--ml-green);
    text-align: center;
    padding: 7px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--ml-green);
    margin-top: 6px;
    transition: all 0.15s;
  }
  .btn-share:hover { background: var(--ml-green-light); }

  /* ── DISCLAIMER ── */
  .disclaimer {
    margin-top: 2.5rem;
    padding: 1rem 1.25rem;
    background: white;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .disclaimer strong { color: var(--text-mid); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1A1A1A;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.25s;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1rem;
  }

  @media (max-width: 600px) {
    .header-inner { gap: 0.5rem; }
    .affiliate-badge { display: none; }
    .product-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .card-price { font-size: 16px; }
    .main-wrap { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo" aria-label="MaisBarato - Ofertas do Mercado Livre">Mais<span>Barato</span></div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Buscar produto..." />
      <button onclick="doSearch()">&#128269;</button>
    </div>
    <div class="affiliate-badge">🤝 Afiliado ML</div>
  </div>
</header>

<div class="config-banner">
  <div class="cb-inner">
    <span>⚙️ Sua tag de afiliado:</span>
    <input type="text" id="affiliateTagInput" placeholder="ex: seu_usuario-55" value="bebr9579545" />
    <button onclick="saveTag()">Salvar</button>
    <span class="tag-preview" id="tagPreview"></span>
    <span style="font-size:12px;color:#888;margin-left:auto;">
      Obtenha sua tag em <a href="https://afiliados.mercadolivre.com.br" target="_blank" style="color:var(--ml-blue)">afiliados.mercadolivre.com.br</a>
    </span>
  </div>
</div>

<div class="main-wrap">
  <div class="categories" id="categories">
    <button class="cat-btn active" data-query="mais vendidos eletrônicos" data-label="📱 Eletrônicos" onclick="selectCategory(this)">📱 Eletrônicos</button>
    <button class="cat-btn" data-query="notebook laptop" data-label="💻 Computadores" onclick="selectCategory(this)">💻 Computadores</button>
    <button class="cat-btn" data-query="fone de ouvido headphone" data-label="🎧 Áudio" onclick="selectCategory(this)">🎧 Áudio</button>
    <button class="cat-btn" data-query="smartwatch relogio inteligente" data-label="⌚ Smartwatch" onclick="selectCategory(this)">⌚ Smartwatch</button>
    <button class="cat-btn" data-query="casa inteligente smart home" data-label="🏠 Casa" onclick="selectCategory(this)">🏠 Casa</button>
    <button class="cat-btn" data-query="câmera fotográfica" data-label="📷 Câmeras" onclick="selectCategory(this)">📷 Câmeras</button>
    <button class="cat-btn" data-query="perfume masculino feminino" data-label="🌸 Beleza" onclick="selectCategory(this)">🌸 Beleza</button>
    <button class="cat-btn" data-query="tênis esportivo" data-label="👟 Tênis" onclick="selectCategory(this)">👟 Tênis</button>
    <button class="cat-btn" data-query="livro bestseller" data-label="📚 Livros" onclick="selectCategory(this)">📚 Livros</button>
    <button class="cat-btn" data-query="brinquedo infantil" data-label="🧸 Brinquedos" onclick="selectCategory(this)">🧸 Brinquedos</button>
  </div>

  <div class="results-meta" id="resultsMeta" style="display:none">
    <span class="results-count" id="resultsCount"></span>
    <select class="sort-select" id="sortSelect" onchange="applySortAndRender()">
      <option value="relevance">Mais relevantes</option>
      <option value="price_asc">Menor preço</option>
      <option value="price_desc">Maior preço</option>
      <option value="discount">Maior desconto</option>
    </select>
  </div>

  <div id="stateBox" class="state-box">
    <div class="spinner"></div>
    <p>Buscando os melhores produtos...</p>
  </div>

  <div class="product-grid" id="productGrid"></div>

  <div class="disclaimer">
    <strong>Aviso obrigatório (CONAR):</strong> Esta página contém links de afiliado. Ao clicar e comprar, recebo uma comissão sem custo adicional para você. Todos os produtos são vendidos diretamente pelo <strong>Mercado Livre</strong>. Os preços e disponibilidade podem mudar a qualquer momento — confirme sempre no site antes de comprar. Esta vitrine segue os <strong>Termos e Condições do Programa de Afiliados e Criadores do Mercado Livre</strong>.
  </div>
</div>

<footer>
  Vitrine de afiliados • Conteúdo publicitário • Preços sujeitos a alteração
</footer>

<div class="toast" id="toast"></div>

<script>
  const PROXY = 'https://api.mercadolibre.com';
  let allProducts = [];
  let affiliateTag = localStorage.getItem('ml_affiliate_tag') || 'bebr9579545';
  let currentQuery = 'mais vendidos eletrônicos';

  // ── Restore saved tag ──
  (function initTag() {
    const saved = localStorage.getItem('ml_affiliate_tag');
    if (saved) affiliateTag = saved;
    document.getElementById('affiliateTagInput').value = affiliateTag;
    const prev = document.getElementById('tagPreview');
    prev.style.display = 'inline';
    prev.textContent = '✅ Tag ativa: ' + affiliateTag;
  })();

  function saveTag() {
    const v = document.getElementById('affiliateTagInput').value.trim();
    if (!v) { showToast('Digite sua tag de afiliado'); return; }
    affiliateTag = v;
    localStorage.setItem('ml_affiliate_tag', v);
    const prev = document.getElementById('tagPreview');
    prev.style.display = 'inline';
    prev.textContent = '✅ Tag salva: ' + v;
    showToast('Tag de afiliado salva!');
    renderProducts(allProducts);
  }

  function buildAffiliateUrl(itemUrl) {
    if (!itemUrl) return '#';
    // Formato oficial do Programa de Afiliados ML
    // Parâmetros: LID = tag do afiliado, matt_tool=afiliation
    try {
      const url = new URL(itemUrl);
      url.searchParams.set('LID', affiliateTag);
      url.searchParams.set('matt_tool', 'afiliation');
      url.searchParams.set('matt_word', affiliateTag);
      return url.toString();
    } catch(e) {
      return itemUrl;
    }
  }

  function formatPrice(n) {
    return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function calcInstallments(price) {
    if (price >= 100) {
      const p = Math.ceil(price / 12 * 100) / 100;
      return `12x de ${formatPrice(p)}`;
    }
    return null;
  }

  function renderStars(rating) {
    if (!rating) return '';
    const full = Math.round(rating);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function selectCategory(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentQuery = btn.dataset.query;
    fetchProducts(currentQuery);
  }

  function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    currentQuery = q;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    fetchProducts(q);
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  async function fetchProducts(query) {
    showLoading();
    try {
      const url = `${PROXY}/sites/MLB/search?q=${encodeURIComponent(query)}&limit=48&sort=relevance`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      allProducts = (data.results || []).filter(p => p.thumbnail && p.permalink);
      renderProducts(allProducts);
    } catch (e) {
      showError(e.message);
    }
  }

  function applySortAndRender() {
    const sort = document.getElementById('sortSelect').value;
    let sorted = [...allProducts];
    if (sort === 'price_asc') sorted.sort((a, b) => a.price - b.price);
    else if (sort === 'price_desc') sorted.sort((a, b) => b.price - a.price);
    else if (sort === 'discount') sorted.sort((a, b) => {
      const da = a.original_price ? (1 - a.price / a.original_price) : 0;
      const db = b.original_price ? (1 - b.price / b.original_price) : 0;
      return db - da;
    });
    renderCards(sorted);
  }

  function renderProducts(products) {
    const meta = document.getElementById('resultsMeta');
    const count = document.getElementById('resultsCount');
    meta.style.display = products.length ? 'flex' : 'none';
    count.textContent = `${products.length} produtos encontrados`;
    document.getElementById('sortSelect').value = 'relevance';
    renderCards(products);
  }

  function renderCards(products) {
    const grid = document.getElementById('productGrid');
    document.getElementById('stateBox').style.display = 'none';
    grid.innerHTML = '';

    if (!products.length) {
      document.getElementById('stateBox').style.display = 'block';
      document.getElementById('stateBox').innerHTML = '<p>Nenhum produto encontrado. Tente outra busca.</p>';
      return;
    }

    products.forEach(p => {
      const affUrl = buildAffiliateUrl(p.permalink);
      const hasDiscount = p.original_price && p.original_price > p.price;
      const discountPct = hasDiscount ? Math.round((1 - p.price / p.original_price) * 100) : 0;
      const freeShipping = p.shipping && p.shipping.free_shipping;
      const installments = calcInstallments(p.price);
      const rating = p.seller && p.seller.seller_reputation ? null : null;
      const reviewCount = p.reviews_count || (p.seller ? null : null);

      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="${p.thumbnail.replace('I.jpg','O.jpg')}" alt="${escHtml(p.title)}" loading="lazy" onerror="this.src='${p.thumbnail}'">
          ${freeShipping ? '<span class="free-shipping-badge">FRETE GRÁTIS</span>' : ''}
          ${installments ? '<span class="installments-badge">12x</span>' : ''}
        </div>
        <div class="card-body">
          <div class="card-title" title="${escHtml(p.title)}">${escHtml(p.title)}</div>
          <div class="card-price-area">
            ${hasDiscount ? `<div class="old-price">${formatPrice(p.original_price)}</div>` : ''}
            <div class="price-row">
              <span class="card-price">${formatPrice(p.price)}</span>
              ${discountPct >= 5 ? `<span class="discount-tag">-${discountPct}%</span>` : ''}
            </div>
            ${installments ? `<div class="installments">${installments} sem juros*</div>` : ''}
          </div>
          <div class="card-footer">
            <a href="${affUrl}" class="btn-ver" target="_blank" rel="noopener" onclick="trackClick('${p.id}')">Ver oferta no ML</a>
            <button class="btn-share" onclick="copyLink('${affUrl}', this)">📋 Copiar link de afiliado</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function showLoading() {
    document.getElementById('productGrid').innerHTML = '';
    document.getElementById('resultsMeta').style.display = 'none';
    const sb = document.getElementById('stateBox');
    sb.style.display = 'block';
    sb.innerHTML = '<div class="spinner"></div><p>Buscando produtos na API do Mercado Livre...</p><p class="hint">Dados oficiais em tempo real</p>';
  }

  function showError(msg) {
    const sb = document.getElementById('stateBox');
    sb.style.display = 'block';
    sb.innerHTML = `<p style="color:#c0392b">⚠️ Não foi possível carregar os produtos.</p><p class="hint">${msg}</p><p class="hint" style="margin-top:8px">A API pública do ML pode ter CORS restrito em ambiente local. Hospede em um servidor ou use uma extensão de CORS para testar.</p>`;
  }

  function copyLink(url, btn) {
    if (!affiliateTag) {
      showToast('⚠️ Configure sua tag de afiliado primeiro!');
      document.getElementById('affiliateTagInput').focus();
      return;
    }
    navigator.clipboard.writeText(url).then(() => {
      showToast('✅ Link copiado com sua tag!');
      const orig = btn.textContent;
      btn.textContent = '✅ Copiado!';
      setTimeout(() => btn.textContent = orig, 2000);
    }).catch(() => {
      prompt('Copie o link abaixo:', url);
    });
  }

  function trackClick(itemId) {
    console.log('[Afiliado] Click no produto:', itemId, '| Tag:', affiliateTag);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init: suporte a ?q= na URL para SearchAction do Google ──
  (function checkUrlQuery() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      document.getElementById('searchInput').value = q;
      currentQuery = q;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    }
  })();
  fetchProducts(currentQuery);
</script>
</body>
</html>
