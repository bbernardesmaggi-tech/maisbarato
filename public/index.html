<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaisBarato — Melhores Ofertas do Mercado Livre Hoje</title>
<meta name="description" content="Encontre as melhores ofertas e produtos mais vendidos do Mercado Livre com frete grátis e parcelamento.">
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
<meta name="theme-color" content="#FFE600">
<link rel="canonical" href="https://maisbaratoone.com.br/">
<meta property="og:type" content="website">
<meta property="og:title" content="MaisBarato — Melhores Ofertas do Mercado Livre">
<meta property="og:description" content="Os melhores produtos do Mercado Livre com frete grátis e menores preços.">
<meta property="og:url" content="https://maisbaratoone.com.br/">
<meta property="og:image" content="https://maisbaratoone.com.br/og-image.png">
<meta property="og:locale" content="pt_BR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://maisbaratoone.com.br/og-image.png">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"MaisBarato","url":"https://maisbaratoone.com.br/","potentialAction":{"@type":"SearchAction","target":{"@type":"EntryPoint","urlTemplate":"https://maisbaratoone.com.br/?q={search_term_string}"},"query-input":"required name=search_term_string"}}</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--y:#FFE600;--b:#3483FA;--bd:#2968C8;--g:#00A650;--gl:#E8F8EF;--bg:#F5F5F5;--s:#fff;--t:#1A1A1A;--tm:#4A4A4A;--mu:#999;--br:#E8E8E8;--r:12px;--sh:0 2px 10px rgba(0,0,0,.07);--shh:0 8px 24px rgba(0,0,0,.13)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);line-height:1.5}
header{background:var(--y);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.13)}
.hdr{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:1rem;height:60px;padding:0 1.5rem}
.logo{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--t);text-decoration:none;flex-shrink:0}
.logo span{color:var(--b)}
.sw{flex:1;display:flex;background:#fff;border-radius:8px;overflow:hidden;border:2.5px solid transparent;transition:border .15s;max-width:540px}
.sw:focus-within{border-color:var(--b)}
.sw input{flex:1;border:none;outline:none;padding:.5rem .85rem;font-size:14px;color:var(--t);background:transparent}
.sw button{background:var(--b);border:none;color:#fff;padding:0 1.1rem;cursor:pointer;font-size:16px;flex-shrink:0;transition:background .15s}
.sw button:hover{background:var(--bd)}
.pill{background:var(--b);color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tabs-wrap{background:#fff;border-bottom:2px solid var(--br);position:sticky;top:60px;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.tabs{max-width:1200px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;padding:0 1rem}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;padding:.85rem 1rem;font-size:13px;font-weight:500;color:var(--mu);cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;margin-bottom:-2px}
.tab:hover{color:var(--b)}
.tab.active{color:var(--b);border-bottom-color:var(--b);font-weight:700}
.pub{background:#fff8e1;border-bottom:1px solid #ffe082;padding:.5rem 1.5rem;font-size:12px;color:#5a4000;text-align:center}
.main{max-width:1200px;margin:0 auto;padding:1.5rem}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem}
.panel-header h2{font-size:20px;font-weight:700}
.ver-mais{font-size:13px;color:var(--b);font-weight:600;text-decoration:none;padding:6px 16px;border:1.5px solid var(--b);border-radius:20px;transition:all .15s;white-space:nowrap}
.ver-mais:hover{background:var(--b);color:#fff}
.sort-bar{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.sort-bar label{font-size:13px;color:var(--mu)}
.sort-sel{font-size:13px;border:1.5px solid var(--br);border-radius:6px;padding:5px 10px;outline:none;background:#fff;cursor:pointer;color:var(--t)}
.state{text-align:center;padding:3.5rem 1rem;color:var(--mu)}
.state p{font-size:15px}
.state .hint{font-size:13px;margin-top:.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.card{background:var(--s);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .18s,transform .18s}
.card:hover{box-shadow:var(--shh);transform:translateY(-4px)}
.card-link{text-decoration:none;color:inherit;display:flex;flex-direction:column;flex:1}
.cimg{position:relative;aspect-ratio:1/1;background:#f5f5f5;overflow:hidden}
.cimg img{width:100%;height:100%;object-fit:contain;padding:12px;transition:transform .22s;display:block}
.card:hover .cimg img{transform:scale(1.06)}
.bship{position:absolute;top:8px;left:8px;background:var(--g);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
.b12x{position:absolute;top:8px;right:8px;background:#ddeeff;color:var(--bd);font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px}
.cbody{padding:.9rem;display:flex;flex-direction:column;gap:5px;flex:1}
.ctitle{font-size:13px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px;color:var(--t)}
.oldp{font-size:11px;color:var(--mu);text-decoration:line-through;display:block}
.prow{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-top:2px}
.price{font-size:19px;font-weight:800;letter-spacing:-.5px;color:var(--t)}
.bdsc{font-size:11px;font-weight:700;color:var(--g);background:var(--gl);padding:2px 7px;border-radius:4px}
.inst{font-size:11px;color:var(--g);font-weight:500;margin-top:1px}
.btn-cp{width:100%;background:var(--gl);color:var(--g);text-align:center;padding:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;border-top:1px solid #c8efd8;transition:background .15s}
.btn-cp:hover{background:#c0ebd0}
.close-btn{background:transparent;border:1.5px solid var(--br);border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;color:var(--mu)}
.disc{margin-top:2.5rem;padding:1.1rem 1.4rem;background:#fff;border-radius:var(--r);border:1px solid var(--br);font-size:12px;color:var(--mu);line-height:1.7}
.disc strong{color:var(--tm)}
footer{text-align:center;padding:2rem 1rem;font-size:12px;color:var(--mu);border-top:1px solid var(--br);margin-top:1.5rem}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A1A;color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:640px){.pill{display:none}.grid{grid-template-columns:repeat(2,1fr);gap:.65rem}.price{font-size:15px}.main{padding:1rem}.tab{padding:.7rem .7rem;font-size:12px}}
</style>
</head>
<body>
<header>
  <div class="hdr">
    <a class="logo" href="/">Mais<span>Barato</span></a>
    <div class="sw">
      <input type="text" id="si" placeholder="Buscar produto..." aria-label="Buscar produto">
      <button onclick="doSearch()" aria-label="Buscar">&#128269;</button>
    </div>
    <div class="pill">🤝 Afiliado ML</div>
  </div>
</header>
<div class="tabs-wrap"><div class="tabs" id="tabs" role="tablist"></div></div>
<div class="pub">⚠️ <strong>Conteúdo publicitário</strong> — Links de afiliado do Mercado Livre. Ao comprar, recebo comissão sem custo para você. <strong>#publi #ad</strong></div>
<main class="main" id="main"></main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const TAG='bebr9579545';
const CATS=[
  {id:'eletronicos', label:'📱 Eletrônicos', q:'smartphone'},
  {id:'computadores',label:'💻 Computadores',q:'notebook'},
  {id:'audio',       label:'🎧 Áudio',       q:'fone bluetooth'},
  {id:'smartwatch',  label:'⌚ Smartwatch',  q:'smartwatch'},
  {id:'casa',        label:'🏠 Casa',        q:'ar condicionado'},
  {id:'cameras',     label:'📷 Câmeras',     q:'camera'},
  {id:'beleza',      label:'🌸 Beleza',      q:'perfume'},
  {id:'tenis',       label:'👟 Tênis',       q:'tenis esportivo'},
  {id:'livros',      label:'📚 Livros',      q:'livro'},
  {id:'brinquedos',  label:'🧸 Brinquedos', q:'brinquedo'},
];

let allProducts = {};
const tabsEl = document.getElementById('tabs');
const mainEl = document.getElementById('main');

// Mapeia rotas amigáveis (definidas no vercel.json) para o id da categoria em CATS
const ROUTE_TO_CAT = {
  '/eletronicos':     'eletronicos',
  '/notebooks':        'computadores',
  '/fones-de-ouvido':  'audio',
  '/smartwatches':     'smartwatch',
  '/casa-inteligente': 'casa',
  '/cameras':          'cameras',
  '/perfumes':         'beleza',
  '/tenis':            'tenis',
  '/livros':           'livros',
  '/brinquedos':       'brinquedos',
};

// Carregar products.json
async function loadProducts() {
  try {
    const res = await fetch('/products.json?v=' + Date.now());
    if (res.ok) allProducts = await res.json();
  } catch(e) { allProducts = {}; }
  buildUI();
  applyRouteFromURL();
}

// Ativa a aba correspondente à rota atual (ex: /notebooks -> categoria "computadores")
// e ajusta title/meta description para essa categoria, ajudando o Google a tratar
// cada rota como uma página distinta.
function applyRouteFromURL() {
  const path = window.location.pathname.replace(/\/$/, '') || '/';
  const catId = ROUTE_TO_CAT[path];
  if (!catId) return; // home ou rota desconhecida: mantém a aba padrão

  switchTab(catId);

  const cat = CATS.find(c => c.id === catId);
  if (cat) {
    const cleanLabel = cat.label.replace(/^\p{Emoji}\s*/u, '').trim();
    const pageUrl = 'https://maisbaratoone.com.br' + path + '/';

    document.title = `${cleanLabel} — Ofertas do Mercado Livre | MaisBarato`;

    const desc = document.querySelector('meta[name="description"]');
    if (desc) desc.setAttribute('content', `As melhores ofertas de ${cleanLabel.toLowerCase()} do Mercado Livre com frete grátis e parcelamento.`);

    // Cada rota de categoria vira sua própria página canônica, não uma variação da home
    const canonical = document.querySelector('link[rel="canonical"]');
    if (canonical) canonical.setAttribute('href', pageUrl);

    const ogUrl = document.querySelector('meta[property="og:url"]');
    if (ogUrl) ogUrl.setAttribute('content', pageUrl);

    const ogTitle = document.querySelector('meta[property="og:title"]');
    if (ogTitle) ogTitle.setAttribute('content', `${cleanLabel} — Melhores Ofertas do Mercado Livre`);
  }
}

function buildUI() {
  tabsEl.innerHTML = '';
  mainEl.innerHTML = '';

  CATS.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.id = 'tab-' + cat.id;
    btn.setAttribute('role','tab');
    btn.textContent = cat.label;
    btn.onclick = () => switchTab(cat.id);
    tabsEl.appendChild(btn);

    const items = allProducts[cat.id] || [];
    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + cat.id;

    const sortBarHtml = items.length > 1 ? `
      <div class="sort-bar" id="sort-bar-${cat.id}">
        <label>Ordenar por:</label>
        <select class="sort-sel" id="sort-${cat.id}" onchange="applySort('${cat.id}')">
          <option value="rel">Padrão</option>
          <option value="asc">Menor preço</option>
          <option value="desc">Maior preço</option>
          <option value="dsc">Maior desconto</option>
        </select>
      </div>` : '';

    panel.innerHTML = `
      <div class="panel-header">
        <h2>${cat.label}</h2>
        <a class="ver-mais" href="https://www.mercadolivre.com.br/jm/search?as_word=${encodeURIComponent(cat.q)}&LID=${TAG}&matt_tool=afiliation&matt_word=${TAG}" target="_blank" rel="noopener sponsored">Ver mais no ML ↗</a>
      </div>
      ${sortBarHtml}
      <div id="grid-${cat.id}">
        ${items.length === 0
          ? `<div class="state"><p>Em breve</p><p class="hint">Produtos desta categoria serão adicionados em breve.</p></div>`
          : ''}
      </div>`;
    mainEl.appendChild(panel);

    if (items.length > 0) renderGrid(document.getElementById('grid-' + cat.id), items);
  });

  mainEl.insertAdjacentHTML('beforeend', `
    <div class="disc">
      <strong>Aviso obrigatório (CONAR/CDC):</strong> Esta página contém links de afiliado do Programa de Afiliados e Criadores do Mercado Livre (ID: ${TAG}). Ao clicar e comprar, posso receber comissão a título de direito de imagem, sem custo adicional para você. Todos os produtos são vendidos e entregues pelo <strong>Mercado Livre</strong>. Preços e disponibilidade podem mudar — confirme sempre antes de comprar.
    </div>`);

  document.body.insertAdjacentHTML('beforeend',
    '<footer>MaisBarato · Vitrine de afiliados do Mercado Livre · Conteúdo publicitário</footer>');
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  const sr = document.getElementById('panel-search');
  if (sr) sr.remove();
  const offset = 130;
  const top = document.getElementById('panel-'+id).getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({top, behavior:'smooth'});
}

function applySort(id) {
  const s = document.getElementById('sort-'+id).value;
  const items = [...(allProducts[id] || [])];
  if (s==='asc')  items.sort((a,b) => a.price - b.price);
  if (s==='desc') items.sort((a,b) => b.price - a.price);
  if (s==='dsc')  items.sort((a,b) => {
    const da = a.original_price ? (1-a.price/a.original_price) : 0;
    const db = b.original_price ? (1-b.price/b.original_price) : 0;
    return db - da;
  });
  renderGrid(document.getElementById('grid-'+id), items);
}

// Busca local nos produtos cadastrados
async function doSearch() {
  const q = document.getElementById('si').value.trim().toLowerCase();
  if (!q) return;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  let sr = document.getElementById('panel-search');
  if (!sr) {
    sr = document.createElement('div');
    sr.id = 'panel-search';
    sr.className = 'panel active';
    mainEl.insertBefore(sr, mainEl.firstChild);
  } else sr.classList.add('active');

  // Buscar em todos os produtos cadastrados
  const results = [];
  Object.values(allProducts).forEach(items => {
    items.forEach(p => {
      if (p.title.toLowerCase().includes(q)) results.push(p);
    });
  });

  sr.innerHTML = `
    <div class="panel-header">
      <h2>🔍 "${esc(q)}" — ${results.length} resultado${results.length !== 1 ? 's' : ''}</h2>
      <button class="close-btn" onclick="closeSearch()">✕ Fechar</button>
    </div>
    <div id="grid-search"></div>`;

  window.scrollTo({top:0, behavior:'smooth'});

  if (results.length > 0) {
    renderGrid(document.getElementById('grid-search'), results);
  } else {
    document.getElementById('grid-search').innerHTML = `
      <div class="state">
        <p>Nenhum produto encontrado para "${esc(q)}".</p>
        <p class="hint">Tente outra palavra ou navegue pelas categorias.</p>
      </div>`;
  }
}

function closeSearch() {
  const p = document.getElementById('panel-search');
  if (p) p.remove();
  document.getElementById('si').value = '';
  switchTab(CATS[0].id);
}

document.getElementById('si').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

function renderGrid(el, items) {
  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach(p => {
    const url = p.permalink;
    const hasDsc = p.original_price && p.original_price > p.price;
    const dPct = hasDsc ? Math.round((1-p.price/p.original_price)*100) : 0;
    const free = p.free_shipping;
    const inst = p.price >= 100 ? brl(p.price/12) : '';
    const thumb = (p.thumbnail||'').replace('I.jpg','O.jpg');
    const art = document.createElement('article');
    art.className = 'card';
    art.innerHTML = `
      <a href="${esc(url)}" target="_blank" rel="noopener sponsored" class="card-link">
        <div class="cimg">
          <img src="${esc(thumb)}" alt="${esc(p.title)}" loading="lazy" onerror="this.src='${esc(p.thumbnail||'')}';this.onerror=null" width="220" height="220">
          ${free?'<span class="bship">FRETE GRÁTIS</span>':''}
          ${inst?'<span class="b12x">12x</span>':''}
        </div>
        <div class="cbody">
          <p class="ctitle">${esc(p.title)}</p>
          <div>
            ${hasDsc?`<s class="oldp">${brl(p.original_price)}</s>`:''}
            <div class="prow"><span class="price">${brl(p.price)}</span>${dPct>=5?`<span class="bdsc">-${dPct}%</span>`:''}</div>
            ${inst?`<p class="inst">12x de ${inst} sem juros*</p>`:''}
          </div>
        </div>
      </a>
      <button class="btn-cp" onclick="cp('${url.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',this)">📋 Copiar link de afiliado</button>`;
    grid.appendChild(art);
  });
  el.innerHTML = '';
  el.appendChild(grid);
}

function brl(n){return'R$\u00a0'+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cp(url,btn){navigator.clipboard.writeText(url).then(()=>{toast('✅ Link copiado!');const o=btn.textContent;btn.textContent='✅ Copiado!';setTimeout(()=>btn.textContent=o,2000);}).catch(()=>prompt('Copie:',url));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

loadProducts();
</script>
</body>
</html>
