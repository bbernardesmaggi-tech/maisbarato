<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaisBarato — Painel Admin</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--y:#FFE600;--b:#3483FA;--bd:#2968C8;--g:#00A650;--gl:#E8F8EF;--bg:#F5F5F5;--s:#fff;--t:#1A1A1A;--mu:#888;--br:#E0E0E0;--r:10px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
header{background:var(--y);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--b)}
.admin-badge{background:#1A1A1A;color:var(--y);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.main{max-width:900px;margin:0 auto;padding:1.5rem}
h1{font-size:20px;font-weight:700;margin-bottom:1.5rem;color:var(--t)}

/* ADD PRODUCT */
.add-card{background:var(--s);border-radius:var(--r);padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:1.5rem}
.add-card h2{font-size:15px;font-weight:600;margin-bottom:1rem;color:var(--t)}
.cat-select{width:100%;border:1.5px solid var(--br);border-radius:8px;padding:.6rem .85rem;font-size:14px;outline:none;background:#fff;color:var(--t);margin-bottom:.75rem;cursor:pointer}
.cat-select:focus{border-color:var(--b)}
.link-row{display:flex;gap:.75rem}
.link-input{flex:1;border:1.5px solid var(--br);border-radius:8px;padding:.6rem .85rem;font-size:14px;outline:none;color:var(--t)}
.link-input:focus{border-color:var(--b)}
.btn-fetch{background:var(--b);color:#fff;border:none;border-radius:8px;padding:.6rem 1.25rem;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-fetch:hover{background:var(--bd)}
.btn-fetch:disabled{background:var(--br);cursor:not-allowed}

/* PREVIEW */
.preview{background:#f8f8f8;border-radius:8px;padding:1rem;margin-top:1rem;display:none;align-items:center;gap:1rem}
.preview.show{display:flex}
.preview img{width:80px;height:80px;object-fit:contain;border-radius:6px;background:#fff;padding:4px;flex-shrink:0}
.preview-info{flex:1;min-width:0}
.preview-title{font-size:13px;font-weight:500;margin-bottom:.4rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.preview-price{font-size:18px;font-weight:800;color:var(--t)}
.preview-disc{font-size:11px;color:var(--g);font-weight:700;margin-left:.5rem}
.preview-ship{font-size:11px;color:var(--g);margin-top:.25rem}
.btn-add{background:var(--g);color:#fff;border:none;border-radius:8px;padding:.6rem 1.25rem;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;transition:background .15s}
.btn-add:hover{background:#008a42}

/* CATEGORIES */
.cat-section{background:var(--s);border-radius:var(--r);padding:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:1rem}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.cat-header h3{font-size:15px;font-weight:700}
.cat-count{font-size:12px;color:var(--mu);background:var(--bg);padding:3px 8px;border-radius:10px}
.product-list{display:flex;flex-direction:column;gap:.5rem}
.product-item{display:flex;align-items:center;gap:.75rem;padding:.6rem;background:var(--bg);border-radius:8px}
.product-item img{width:48px;height:48px;object-fit:contain;border-radius:6px;background:#fff;padding:3px;flex-shrink:0}
.product-item-info{flex:1;min-width:0}
.product-item-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-item-price{font-size:13px;font-weight:700;color:var(--t)}
.btn-remove{background:transparent;border:1px solid #ffb3b3;color:#c0392b;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .15s}
.btn-remove:hover{background:#fff0f0}
.empty-cat{font-size:13px;color:var(--mu);text-align:center;padding:1rem;font-style:italic}

/* EXPORT */
.export-bar{background:var(--s);border-radius:var(--r);padding:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.export-bar p{font-size:13px;color:var(--mu)}
.btn-export{background:var(--y);color:var(--t);border:none;border-radius:8px;padding:.6rem 1.25rem;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-export:hover{background:#e6cf00}
.btn-view{background:var(--b);color:#fff;border:none;border-radius:8px;padding:.6rem 1.25rem;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}

/* SPIN */
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="logo">Mais<span>Barato</span></div>
  <div class="admin-badge">⚙️ Painel Admin</div>
</header>

<div class="main">
  <h1>Gerenciar Produtos da Vitrine</h1>

  <!-- Exportar / Ver site -->
  <div class="export-bar">
    <p id="totalCount">0 produtos cadastrados em 10 categorias</p>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="btn-export" onclick="exportJSON()">⬇️ Exportar products.json</button>
      <a class="btn-view" href="/" target="_blank">🌐 Ver vitrine</a>
    </div>
  </div>

  <!-- Adicionar produto -->
  <div class="add-card">
    <h2>➕ Adicionar produto</h2>
    <select class="cat-select" id="catSelect">
      <option value="">Selecione a categoria...</option>
      <option value="eletronicos">📱 Eletrônicos</option>
      <option value="computadores">💻 Computadores</option>
      <option value="audio">🎧 Áudio</option>
      <option value="smartwatch">⌚ Smartwatch</option>
      <option value="casa">🏠 Casa</option>
      <option value="cameras">📷 Câmeras</option>
      <option value="beleza">🌸 Beleza</option>
      <option value="tenis">👟 Tênis</option>
      <option value="livros">📚 Livros</option>
      <option value="brinquedos">🧸 Brinquedos</option>
    </select>
    <div class="link-row">
      <input type="text" class="link-input" id="linkInput" placeholder="Cole o link do produto (meli.la/xxx ou mercadolivre.com.br/...)">
      <button class="btn-fetch" id="fetchBtn" onclick="fetchProduct()">Buscar produto</button>
    </div>
    <div class="preview" id="preview">
      <img id="prevImg" src="" alt="">
      <div class="preview-info">
        <div class="preview-title" id="prevTitle"></div>
        <div>
          <span class="preview-price" id="prevPrice"></span>
          <span class="preview-disc" id="prevDisc"></span>
        </div>
        <div class="preview-ship" id="prevShip"></div>
      </div>
      <button class="btn-add" onclick="addProduct()">✅ Adicionar</button>
    </div>
  </div>

  <!-- Categorias -->
  <div id="categories"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TAG = 'bebr9579545';
const STORAGE_KEY = 'maisbarato_products';

const CATS = [
  {id:'eletronicos', label:'📱 Eletrônicos'},
  {id:'computadores',label:'💻 Computadores'},
  {id:'audio',       label:'🎧 Áudio'},
  {id:'smartwatch',  label:'⌚ Smartwatch'},
  {id:'casa',        label:'🏠 Casa'},
  {id:'cameras',     label:'📷 Câmeras'},
  {id:'beleza',      label:'🌸 Beleza'},
  {id:'tenis',       label:'👟 Tênis'},
  {id:'livros',      label:'📚 Livros'},
  {id:'brinquedos',  label:'🧸 Brinquedos'},
];

let products = loadProducts();
let pendingProduct = null;

function loadProducts() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch(e) { return {}; }
}

function saveProducts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
  renderAll();
}

// ── BUSCAR PRODUTO VIA API ML (funciona no browser) ──
async function fetchProduct() {
  const link = document.getElementById('linkInput').value.trim();
  const cat  = document.getElementById('catSelect').value;

  if (!link) { toast('Cole o link do produto'); return; }
  if (!cat)  { toast('Selecione uma categoria'); return; }

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Buscando...';
  document.getElementById('preview').classList.remove('show');

  try {
    // Resolver URL para pegar ID do produto
    const itemId = await resolveItemId(link);
    if (!itemId) throw new Error('Não foi possível identificar o produto ML.');

    // Buscar dados via API ML (funciona no browser)
    const res = await fetch(`https://api.mercadolibre.com/items/${itemId}`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error(`API ML retornou ${res.status}`);

    const data = await res.json();

    // Montar URL de afiliado
    const affUrl = buildAffUrl(data.permalink);

    pendingProduct = {
      id:             data.id,
      title:          data.title,
      price:          data.price,
      original_price: data.original_price,
      thumbnail:      (data.thumbnail || '').replace('I.jpg','O.jpg'),
      permalink:      affUrl,
      free_shipping:  (data.shipping || {}).free_shipping || false,
    };

    // Mostrar preview
    const disc = data.original_price && data.original_price > data.price
      ? Math.round((1 - data.price / data.original_price) * 100) : 0;

    document.getElementById('prevImg').src   = pendingProduct.thumbnail;
    document.getElementById('prevTitle').textContent = data.title;
    document.getElementById('prevPrice').textContent = brl(data.price);
    document.getElementById('prevDisc').textContent  = disc >= 5 ? `-${disc}%` : '';
    document.getElementById('prevShip').textContent  = pendingProduct.free_shipping ? '✅ Frete grátis' : '';
    document.getElementById('preview').classList.add('show');

  } catch(e) {
    toast('❌ ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Buscar produto';
  }
}

async function resolveItemId(url) {
  // Tentar extrair ID direto da URL
  const patterns = [
    /\/MLB-?(\d+)/i,
    /MLB(\d+)/i,
    /item_id=MLB(\d+)/i,
    /\/p\/MLB(\d+)/i,
  ];

  for (const p of patterns) {
    const m = url.match(p);
    if (m) return `MLB${m[1]}`;
  }

  // Se for link curto (meli.la), tentar fetch para pegar o redirect
  // O browser permite isso sem CORS
  try {
    const res = await fetch(url, { method: 'HEAD', redirect: 'follow' });
    const finalUrl = res.url;
    for (const p of patterns) {
      const m = finalUrl.match(p);
      if (m) return `MLB${m[1]}`;
    }
  } catch(e) {
    // Tentar GET
    try {
      const res = await fetch(url, { redirect: 'follow' });
      const text = await res.text();
      for (const p of patterns) {
        const m = (res.url + text.substring(0, 500)).match(p);
        if (m) return `MLB${m[1]}`;
      }
    } catch(e2) {}
  }
  return null;
}

function addProduct() {
  if (!pendingProduct) return;
  const cat = document.getElementById('catSelect').value;
  if (!products[cat]) products[cat] = [];

  // Evitar duplicatas
  if (products[cat].find(p => p.id === pendingProduct.id)) {
    toast('Produto já está nesta categoria!');
    return;
  }

  products[cat].push({...pendingProduct});
  saveProducts();
  toast('✅ Produto adicionado!');

  // Limpar
  document.getElementById('linkInput').value = '';
  document.getElementById('preview').classList.remove('show');
  pendingProduct = null;
}

function removeProduct(catId, productId) {
  if (!products[catId]) return;
  products[catId] = products[catId].filter(p => p.id !== productId);
  saveProducts();
  toast('Produto removido');
}

// ── RENDER ──
function renderAll() {
  const container = document.getElementById('categories');
  let total = 0;
  container.innerHTML = '';

  CATS.forEach(cat => {
    const items = products[cat.id] || [];
    total += items.length;

    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.innerHTML = `
      <div class="cat-header">
        <h3>${cat.label}</h3>
        <span class="cat-count">${items.length} produto${items.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="product-list" id="list-${cat.id}">
        ${items.length === 0
          ? '<div class="empty-cat">Nenhum produto ainda. Cole um link acima para adicionar.</div>'
          : items.map(p => `
            <div class="product-item">
              <img src="${esc(p.thumbnail)}" alt="${esc(p.title)}" onerror="this.src='${esc(p.thumbnail)}'">
              <div class="product-item-info">
                <div class="product-item-title" title="${esc(p.title)}">${esc(p.title)}</div>
                <div class="product-item-price">${brl(p.price)}</div>
              </div>
              <button class="btn-remove" onclick="removeProduct('${cat.id}','${p.id}')">Remover</button>
            </div>`).join('')}
      </div>`;
    container.appendChild(sec);
  });

  document.getElementById('totalCount').textContent =
    `${total} produto${total !== 1 ? 's' : ''} cadastrado${total !== 1 ? 's' : ''} em ${CATS.length} categorias`;
}

// ── EXPORTAR JSON ──
function exportJSON() {
  const data = JSON.stringify(products, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'products.json'; a.click();
  URL.revokeObjectURL(url);
  toast('✅ products.json exportado! Faça upload no GitHub em public/products.json');
}

// ── UTILITÁRIOS ──
function buildAffUrl(url) {
  try {
    const u = new URL(url);
    u.searchParams.set('LID', TAG);
    u.searchParams.set('matt_tool', 'afiliation');
    u.searchParams.set('matt_word', TAG);
    return u.toString();
  } catch(e) { return url; }
}
function brl(n) {
  return 'R$\u00a0' + Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Enter no input
document.getElementById('linkInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchProduct();
});

renderAll();
</script>
</body>
</html>
