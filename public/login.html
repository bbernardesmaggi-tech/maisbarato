<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>MaisBarato — Login</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .card{background:#fff;border-radius:16px;padding:2.5rem;max-width:400px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,.1)}
  .logo{font-size:26px;font-weight:800;text-align:center;margin-bottom:.25rem}
  .logo span{color:#3483FA}
  h1{font-size:15px;font-weight:600;color:#666;text-align:center;margin-bottom:1.75rem}
  .field{margin-bottom:1.1rem}
  label{font-size:12px;font-weight:700;color:#666;display:block;margin-bottom:.4rem;text-transform:uppercase}
  input{width:100%;border:1.5px solid #E0E0E0;border-radius:8px;padding:.65rem .85rem;font-size:14px;outline:none;box-sizing:border-box;transition:border .15s}
  input:focus{border-color:#3483FA}
  .btn{width:100%;background:#FFE600;color:#1A1A1A;font-weight:700;font-size:15px;padding:.75rem;border:none;border-radius:8px;cursor:pointer;margin-top:.5rem;transition:background .15s}
  .btn:hover{background:#e6cf00}
  .err{background:#FEECEC;color:#c0392b;border-radius:8px;padding:.7rem 1rem;font-size:13px;margin-top:1rem;display:none}
  .err.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Mais<span>Barato</span></div>
  <h1>Área restrita — faça login para continuar</h1>
  <form id="loginForm">
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="user" autocomplete="username" required>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="pass" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Entrar</button>
    <div class="err" id="err"></div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value;
  const errEl = document.getElementById('err');
  errEl.className = 'err';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass }),
    });
    const data = await res.json();

    if (data.ok) {
      const params = new URLSearchParams(location.search);
      const redirect = params.get('redirect') || '/admin.html';
      location.href = redirect;
    } else {
      errEl.textContent = data.error || 'Usuário ou senha inválidos.';
      errEl.classList.add('show');
    }
  } catch (err) {
    errEl.textContent = 'Erro ao conectar. Tente novamente.';
    errEl.classList.add('show');
  }
});
</script>
</body>
</html>
